name: Tests
on:
  pull_request:
    paths-ignore: ['docs/**', 'README.md']
  push:
    branches: [main, stable]
    paths-ignore: ['docs/**', 'README.md']
jobs:
  tests:
    name: ${{ matrix.name || matrix.python }}
    runs-on: ${{ matrix.os || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {python: '3.15'}
          - {python: '3.14'}
          - {python: '3.13'}
          - {name: Windows, python: '3.13', os: windows-latest}
          - {name: Mac, python: '3.13', os: macos-latest}
          - {python: '3.12'}
          - {python: '3.11'}
          - {python: '3.10'}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          # Before upgrading uv version, make sure astral-sh/setup-uv action knows its checksum.
          # See: https://github.com/astral-sh/setup-uv/issues/851#issuecomment-4282017837
          # (astral-sh/setup-uv#919 may automate this in future)
          version: "0.11.28"
          enable-cache: true
          prune-cache: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true
      - run: uv run --locked tox run -e ${{ matrix.tox || format('py{0}', matrix.python) }}

  typing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          # Before upgrading uv version, make sure astral-sh/setup-uv action knows its checksum.
          # See: https://github.com/astral-sh/setup-uv/issues/851#issuecomment-4282017837
          # (astral-sh/setup-uv#919 may automate this in future)
          version: "0.11.28"
          enable-cache: true
          prune-cache: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: pyproject.toml
      - name: cache mypy
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ./.mypy_cache
          key: mypy|${{ hashFiles('pyproject.toml') }}
      - run: uv run --locked tox run -e typing

  examples:
      name: Example (${{ matrix.example }})
      runs-on: ubuntu-latest
      strategy:
        fail-fast: false
        matrix:
          example: [restapi, chat_app, video, blog]
      steps:
        - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
          with:
            # Before upgrading uv version, make sure astral-sh/setup-uv action knows its checksum.
            # See: https://github.com/astral-sh/setup-uv/issues/851#issuecomment-4282017837
            # (astral-sh/setup-uv#919 may automate this in future)
            version: "0.11.28"
            enable-cache: true
            prune-cache: false
        - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
          with:
            python-version-file: pyproject.toml
        - name: Install example deps
          working-directory: examples/${{ matrix.example }}
          run: uv sync --locked
        - name: Run example tests
          working-directory: examples/${{ matrix.example }}
          run: uv run pytest
